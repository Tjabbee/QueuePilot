<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueuePilot{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .navbar-brand { letter-spacing: 0.5px; }
        .nav-bg { background-color: #1a1a2e; }
        .table thead th { background-color: #e9ecef; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-active { background-color: #198754; }
        code { background: #e9ecef; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
    </style>
</head>
<body>
    <nav class="navbar nav-bg navbar-dark mb-4 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-5" href="/">
                <i class="bi bi-list-check me-2"></i>QueuePilot
            </a>
            <a class="text-white-50 small text-decoration-none" href="/settings">
                <i class="bi bi-gear me-1"></i>Settings
            </a>
        </div>
    </nav>

    <div class="container" style="max-width: 1100px;">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
