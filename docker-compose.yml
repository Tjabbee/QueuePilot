services:
  queuepilot:
    build: .
    container_name: queuepilot
    restart: no
    # Change network to match your setup
    networks:
      - vlan20_net
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./logs:/app/logs

  # Web interface for managing sites and credentials
  queuepilot-web:
    build: ./web
    container_name: queuepilot-web
    restart: unless-stopped
    networks:
      - vlan20_net
    env_file:
      - .env
    ports:
      # Change the host port (5000) if it conflicts with something else
      - "5000:5000"
    volumes:
      # Docker socket so the web UI can trigger the queuepilot container
      - /var/run/docker.sock:/var/run/docker.sock

  # Requires REDIS_URL and DB env vars to be set in .env before starting
  celery-worker:
    build: .
    container_name: queuepilot-celery-worker
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=10
    networks:
      - vlan20_net
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./logs:/app/logs

  celery-beat:
    build: .
    container_name: queuepilot-celery-beat
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    networks:
      - vlan20_net
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./logs:/app/logs
      - celery_beat_data:/app/celerybeat-schedule

volumes:
  db_data:
  celery_beat_data:

# This might not be needed if you have your own network setup
networks:
  vlan20_net:
    external: true
    name: vlan20_net
